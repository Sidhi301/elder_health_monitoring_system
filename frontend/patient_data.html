<!--
  This page shows patient information and health history.
  The user selects one linked patient and then sees the records.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Data - Elder Health Monitoring</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="patient-data">
    <div class="app-shell">
        <header class="top-bar">
            <div>
                <h1>Patient Data</h1>
                <p class="subtitle">View patient details and health record history.</p>
            </div>
            <button id="logoutButton" class="secondary-btn">Logout</button>
        </header>

        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="patient_data.html">Patient Data</a>
            <a href="alerts.html">Alerts</a>
        </nav>

        <section class="card">
            <label for="patientSelect">Select Patient</label>
            <select id="patientSelect"></select>
            <button id="loadPatientButton">Load Patient Data</button>
        </section>

        <section class="card">
            <h2>Patient Details</h2>
            <div id="patientInfo" class="list-box"></div>
        </section>

        <section class="card">
            <h2>Health History</h2>
            <div id="healthHistory" class="list-box"></div>
        </section>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
