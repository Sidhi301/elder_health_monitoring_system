
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Elder Health Monitoring</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">
    <div class="page-container">
        <div class="card auth-card">
            <h1>Elder Health Monitoring</h1>
            <p class="subtitle">Simple login for Care Manager, Parent, and Child users.</p>

            <form id="loginForm" class="form-card">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>

                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>

                <button type="submit">Login</button>
            </form>

            <p id="loginMessage" class="message-box"></p>
            <p class="small-text">New user? <a href="register.html">Register here</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
