<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Elder Health Monitoring</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="register">
    <div class="page-container">
        <div class="card auth-card">
            <h1>Create Account</h1>
            <p class="subtitle">Register as a Care Manager, Parent, or Child.</p>

            <form id="registerForm" class="form-card">
                <label for="registerName">Full Name</label>
                <input type="text" id="registerName" placeholder="Enter your name" required>

                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" placeholder="Enter your email" required>

                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" placeholder="Minimum 6 characters" required>

                <label for="registerRole">Role</label>
                <select id="registerRole" required>
                    <option value="care_manager">Care Manager</option>
                    <option value="parent">Parent</option>
                    <option value="child">Child</option>
                </select>

                <div id="careManagerSecretGroup">
                    <label for="careManagerSecret">Care Manager Secret</label>
                    <input type="password" id="careManagerSecret" placeholder="Enter Care Manager secret">
                </div>

                <button type="submit">Register</button>
            </form>

            <p id="registerMessage" class="message-box"></p>
            <p class="small-text">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
