
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Health Data - Elder Health Monitoring</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="add-health">
    <div class="app-shell">
        <header class="top-bar">
            <div>
                <h1>Add Health Data</h1>
                <p class="subtitle">Care Manager can add new health values here.</p>
            </div>
            <button id="logoutButton" class="secondary-btn">Logout</button>
        </header>

        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="patient_data.html">Patient Data</a>
            <a href="alerts.html">Alerts</a>
        </nav>

        <section class="card">
            <form id="healthForm" class="form-grid">
                <select id="healthPatientId" required></select>
                <input type="number" id="heartRate" placeholder="Heart rate" required>
                <input type="number" id="oxygenLevel" placeholder="Oxygen level" required>
                <input type="number" id="systolicBp" placeholder="Systolic BP" required>
                <input type="number" id="diastolicBp" placeholder="Diastolic BP" required>
                <textarea id="healthNotes" placeholder="Notes"></textarea>
                <button type="submit">Save Health Record</button>
            </form>

            <p id="healthMessage" class="message-box"></p>
        </section>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
